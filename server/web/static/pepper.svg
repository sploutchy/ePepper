<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="ePepper">
  <!-- Brand favicon: just the leading italic "e" of the ePepper wordmark,
       paprika-fixed so it reads on a browser tab regardless of theme.
       The visible logo in the header uses the full text wordmark; the
       favicon collapses it to a single letter for tab-size legibility. -->
  <text x="24" y="36"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44"
        font-style="italic"
        font-weight="400"
        fill="#B83227">e</text>
</svg>
