{% extends "base.html" %}
{% block title %}ePepper · Library{% endblock %}

{% block content %}
<div class="search">
  <input type="search"
         name="q"
         value="{{ q }}"
         placeholder="Search title, ingredients, notes…"
         hx-get="/app/_search"
         hx-trigger="input changed delay:200ms, search"
         hx-target="#list"
         hx-swap="innerHTML"
         hx-include="this"
         autofocus>
</div>

<div id="list">
  {% include "_list.html" %}
</div>
{% endblock %}
