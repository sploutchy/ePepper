{% if not recipes %}
  <p class="muted empty">{% if q %}No matches for “{{ q }}”.{% else %}Nothing saved yet.{% endif %}</p>
{% else %}
  <ul class="recipes">
    {% for r in recipes %}{% include "_card.html" %}{% endfor %}
    {% if has_more %}
      <li class="loader"
          hx-get="/app/_search?q={{ q|urlencode }}&sort={{ sort|urlencode }}&min_rating={{ (min_rating or '')|string|urlencode }}&source={{ source|urlencode }}&offset={{ next_offset }}"
          hx-trigger="revealed"
          hx-swap="outerHTML">Loading…</li>
    {% endif %}
  </ul>
{% endif %}
