<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#FBFAF7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121110" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/app/static/pepper.svg" type="image/svg+xml">
  <title>ePepper · Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,50;1,9..144,400..700,50&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app/static/app.css">
</head>
<body class="centered">
  <main class="login">
    <h1>
      <svg class="pepper" viewBox="0 0 48 48" aria-hidden="true">
        <path d="M14 18 C 6 18, 2 26, 4 36 C 6 46, 14 54, 22 54 C 30 54, 36 47, 36 38 C 36 30, 32 24, 26 21 C 22 19, 18 17, 14 18 Z" fill="currentColor"/>
        <path d="M22 18 C 22 12, 26 9, 32 10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <path d="M28 12 C 32 9, 36 10, 38 14 C 34 15, 30 14, 28 12 Z" fill="currentColor"/>
      </svg>
      <span><span class="brand-e">e</span>Pepper</span>
    </h1>
    <p class="muted">Enter your access code to unlock the recipe library.</p>
    {% if error %}<p class="error">That code doesn't match — try again.</p>{% endif %}
    <form action="/app/login" method="post">
      <input type="password" name="api_key" autofocus required
             placeholder="Access code"
             autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
    <p class="login-hint muted">
      Your access code is the <code>API_KEY</code> set on the server.
      Sessions stay signed in for 30 days.
    </p>
  </main>
</body>
</html>
