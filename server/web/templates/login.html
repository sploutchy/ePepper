<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ePepper · Sign in</title>
  <link rel="stylesheet" href="/app/static/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="centered">
  <main class="login">
    <h1 class="brand">
      <span class="e">e</span>Pepper
    </h1>
    <p class="tagline">Kitchen recipe display</p>
    {% if error %}<p class="error">That code doesn't match — try again.</p>{% endif %}
    <form action="/app/login" method="post">
      <input type="password" name="api_key" autofocus required
             placeholder="Access code"
             autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
    <p class="login-hint muted">
      Your access code is the <code>API_KEY</code> set on the server.
      Sessions stay signed in for 30 days.
    </p>
  </main>
</body>
</html>
