{% from "_icons.html" import icon %}
{% for r in recipes %}
  <li>
    <a href="/app/recipes/{{ r.id }}" class="card">
      <div class="card-title">{{ r.title }}</div>
      <div class="card-meta">
        <span class="stars">{{ stars(r.rating) }}</span>
        <span class="muted">saved {{ fmt_saved(r.saved_at) }}</span>
        {% if r.id == current_recipe_id %}
          <span class="card-badge" title="Currently on display">
            {{ icon("monitor", 14) }}
            <span class="iconbtn-label">on display</span>
          </span>
        {% endif %}
      </div>
    </a>
  </li>
{% endfor %}
{% if has_more %}
  <li class="loader"
      hx-get="/app/_search?q={{ q|urlencode }}&sort={{ sort|urlencode }}&min_rating={{ (min_rating or '')|string|urlencode }}&offset={{ next_offset }}"
      hx-trigger="revealed"
      hx-swap="outerHTML">Loading…</li>
{% endif %}
