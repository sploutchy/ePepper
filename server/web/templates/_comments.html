<ul class="comments comments--marginalia">
  {% for c in comments %}
    <li>
      <span class="comment-body">{{ c.body }}</span>
      <button type="button" class="comment-delete"
              hx-delete="/app/recipes/{{ r_id }}/comments/{{ c.id }}"
              hx-target="#comments"
              hx-swap="innerHTML"
              hx-confirm="Delete this note?"
              title="Delete note" aria-label="Delete note">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </li>
  {% else %}
    <li class="muted">No notes yet.</li>
  {% endfor %}
</ul>

<form class="add-comment add-comment--link"
      hx-post="/app/recipes/{{ r_id }}/comments"
      hx-target="#comments"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset()">
  <textarea name="body" rows="2" placeholder="Add a note…" required></textarea>
  <button type="submit" class="link accent">Save note</button>
</form>
