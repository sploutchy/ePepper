<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#FBFAF7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#121110" media="(prefers-color-scheme: dark)">
  <title>ePepper - Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,50;1,9..144,400..700,50&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/app/" class="brand">
        <svg class="pepper" viewBox="0 0 48 48" aria-hidden="true">
          <path d="M14 18 C 6 18, 2 26, 4 36 C 6 46, 14 54, 22 54 C 30 54, 36 47, 36 38 C 36 30, 32 24, 26 21 C 22 19, 18 17, 14 18 Z" fill="currentColor"/>
          <path d="M22 18 C 22 12, 26 9, 32 10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M28 12 C 32 9, 36 10, 38 14 C 34 15, 30 14, 28 12 Z" fill="currentColor"/>
        </svg>
        <span><span class="brand-e">e</span>Pepper</span>
      </a>
      <nav class="topnav">
        <a href="/app/add" class="iconbtn" title="Add a recipe" aria-label="Add a recipe">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
          <span class="iconbtn-label">Add</span>
        </a>
        <a href="/app/status" class="iconbtn" title="Status" aria-label="Status">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="13" rx="2"></rect><path d="M8 21h8M12 17v4"></path></svg>
          <span class="iconbtn-label">Status</span>
        </a>
        <button type="button" class="iconbtn theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg class="theme-icon-light" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"></path></svg>
          <svg class="theme-icon-dark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <form action="/app/logout" method="post" class="logout-form">
          <button type="submit" class="iconbtn" title="Log out" aria-label="Log out">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg>
            <span class="iconbtn-label">Logout</span>
          </button>
        </form>
      </nav>
    </div>
  </header>

  <main>
    <div id="toast"></div>

    <div class="library-header">
      <h1>The Library</h1>
      <span class="meta">1 recipe from Fooby</span>
    </div>

    <form class="list-controls">
      <input class="list-search" type="search" name="q" value="" placeholder="Search title, ingredients, notes...">
      <select name="sort" class="list-select" aria-label="Sort">
        <option value="" selected>Recently cooked</option>
        <option value="most_cooked">Most cooked</option>
        <option value="oldest">Least recently cooked</option>
      </select>
      <select name="source" class="list-select" aria-label="Source">
        <option value="">All sources</option>
        <option value="allrecipes">Allrecipes</option>
        <option value="andreanguyen">Andreanguyen</option>
        <option value="bonappetit">Bonappetit</option>
        <option value="cordonbleu">Cordonbleu</option>
        <option value="davidlebovitz">Davidlebovitz</option>
        <option value="epicurious">Epicurious</option>
        <option value="fooby" selected>Fooby</option>
        <option value="foodandwine">Foodandwine</option>
        <option value="hot-thai-kitchen">Hot-thai-kitchen</option>
        <option value="justonecookbook">Justonecookbook</option>
        <option value="maangchi">Maangchi</option>
        <option value="nonna">Nonna</option>
        <option value="nytimes">Nytimes</option>
        <option value="pastagrannies">Pastagrannies</option>
        <option value="recipetineats">Recipetineats</option>
        <option value="seriouseats">Seriouseats</option>
        <option value="smittenkitchen">Smittenkitchen</option>
        <option value="toriavey">Toriavey</option>
      </select>
    </form>

    <div id="list">
      <ul class="recipes">
        <li><a href="/app/recipes/3" class="card">
          <div class="card-title"><span>Pilz-Risotto mit Thymian</span><span class="card-source">from Fooby</span></div>
          <div class="card-meta"><span class="muted">cooked 5x, last last week</span></div>
        </a></li>
      </ul>
    </div>
  </main>
</body>
</html>
