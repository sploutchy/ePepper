<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#FBF4E4" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1F1A1D" media="(prefers-color-scheme: dark)">
  <title>ePepper · Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400..700,30..100&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('epepper-theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.dataset.theme = saved;
        }
      } catch (e) {}
    })();
  </script>
</head>
<body class="centered">
  <main class="login">
    <h1>
      <img src="../logo.svg" alt="" class="pepper">
      ePepper
    </h1>
    <p class="muted">Enter your access code to unlock the recipe library.</p>

    <form action="/app/login" method="post">
      <input type="password" name="api_key" autofocus required placeholder="Access code" autocomplete="current-password">
      <button type="submit" class="primary">Sign in</button>
    </form>
    <p class="login-hint">
      Your access code is the <code>API_KEY</code> set on the server.
      Sessions stay signed in for 30 days.
    </p>
  </main>
</body>
</html>
