<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ePepper">
  <title>ePepper logo</title>
  <!-- Hand-drawn pepper: a curvy capsicum body in saffron with a leafy
       teal stem and a tiny highlight stripe. Stroke uses currentColor so
       a parent .brand-dark wrapper can re-tint if needed; fills are
       baked-in for stability across light/dark contexts. -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pepper body fill -->
    <path d="M20 28 C 16 38, 18 50, 28 56 C 40 60, 52 52, 52 40 C 52 32, 46 26, 38 26 C 30 26, 24 22, 20 28 Z"
          fill="#E8A33D" stroke="#1F1812" stroke-width="2.2"/>
    <!-- Lobe shading (subtle curve inside) -->
    <path d="M30 32 C 28 42, 32 50, 40 52"
          stroke="#B57A1C" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Tiny highlight -->
    <path d="M25 32 Q 22 38, 24 44"
          stroke="#FFE0A8" stroke-width="2.4" fill="none"/>
    <!-- Stem cap -->
    <path d="M30 25 C 28 20, 30 16, 34 17 C 40 11, 46 14, 44 21 C 50 22, 50 28, 42 28 C 38 30, 32 30, 30 26 Z"
          fill="#2C6E6A" stroke="#1F1812" stroke-width="2.2"/>
    <!-- Leaf -->
    <path d="M38 18 Q 46 8, 56 12 Q 50 22, 42 22"
          fill="#5DA39E" stroke="#1F1812" stroke-width="2.2"/>
    <!-- Leaf vein -->
    <path d="M40 19 Q 48 14, 54 13" stroke="#1F1812" stroke-width="1.4" fill="none"/>
    <!-- Sparkle "warmth" mark -->
    <g stroke="#1F1812" stroke-width="1.6" opacity="0.85">
      <path d="M9 16 L 13 16 M 11 14 L 11 18"/>
      <path d="M56 44 L 59 44 M 57.5 42.5 L 57.5 45.5"/>
    </g>
  </g>
</svg>
