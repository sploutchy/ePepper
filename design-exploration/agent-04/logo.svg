<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="ePepper">
  <title>ePepper</title>
  <style>
    .body  { fill: #3f6b46; }
    .leaf  { fill: #6a994e; }
    .stem  { stroke: #3f6b46; }
    .vein  { stroke: #3f6b46; }
    .gleam { stroke: #ffffff; stroke-opacity: 0.35; }
    @media (prefers-color-scheme: dark) {
      .body  { fill: #a8c89a; }
      .leaf  { fill: #cbe3b0; }
      .stem  { stroke: #a8c89a; }
      .vein  { stroke: #a8c89a; }
      .gleam { stroke: #1c211e; stroke-opacity: 0.30; }
    }
  </style>
  <!-- Pepper body: soft teardrop -->
  <path
    class="body"
    d="M22 14 C 12 17, 8 27, 12 36 C 15 43, 24 44, 30 41 C 38 37, 40 28, 36 22 C 32 17, 27 14, 22 14 Z"/>
  <!-- Soft gleam -->
  <path
    class="gleam"
    d="M17 22 C 14 25, 13 30, 14 33"
    fill="none"
    stroke-width="2.2"
    stroke-linecap="round"/>
  <!-- Stem -->
  <path
    class="stem"
    d="M24 14 C 23 11, 23 9, 24.5 7.5"
    fill="none"
    stroke-width="2.4"
    stroke-linecap="round"/>
  <!-- Leaf curl -->
  <path
    class="leaf"
    d="M24.5 9 C 27 6, 31 6, 34 8 C 33 11.5, 30 13.5, 27 13.5 C 25.5 13.5, 24.5 12.5, 24 11 Z"/>
  <!-- Leaf vein -->
  <path
    class="vein"
    d="M25 10.5 C 28 9, 31 8.6, 33.4 8.6"
    fill="none"
    stroke-opacity="0.6"
    stroke-width="1"
    stroke-linecap="round"/>
</svg>
