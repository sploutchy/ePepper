<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ePepper">
  <title>ePepper</title>
  <!--
    Mark: a stylized bell pepper rendered as a precise, technical glyph.
    Rounded hex silhouette suggests both a pepper body and a chip / die.
    The stem is a 3-segment notch; a single rectangular facet acts as the
    "highlight". Solid accent green so it stays vivid when used as <img>.
  -->
  <g fill="none" stroke="#4F8A1F" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- pepper body -->
    <path d="M32 14
             C 18 14, 12 22, 12 34
             C 12 46, 20 56, 32 56
             C 44 56, 52 46, 52 34
             C 52 22, 46 14, 32 14 Z"
          fill="#A8E861"/>
    <!-- structural seam -->
    <path d="M32 18 L 32 52" stroke="#2F6F1E" stroke-opacity="0.55" stroke-dasharray="2 3" stroke-width="2"/>
    <!-- stem -->
    <path d="M26 14 L 26 8 L 32 8 L 32 4 L 38 4 L 38 10 L 32 10" stroke="#2F6F1E"/>
    <!-- leaf flare -->
    <path d="M38 10 L 46 6 L 44 14" stroke-linejoin="miter" stroke="#2F6F1E"/>
    <!-- highlight facet -->
    <rect x="18" y="22" width="6" height="14" rx="1" fill="#FFFFFF" stroke="none" opacity="0.55"/>
  </g>
</svg>
