<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>ePepper / add</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/app/" class="brand">
        <img src="../logo.svg" alt="" class="pepper">
        ePepper
      </a>
      <span class="brand-divider">/</span>
      <span class="brand-route"><span class="route-active">add</span></span>

      <nav class="topnav">
        <a href="/app/add" class="iconbtn" title="Add a recipe" aria-label="Add a recipe">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <span class="iconbtn-label">Add</span>
        </a>
        <a href="/app/status" class="iconbtn" title="Status" aria-label="Status">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          <span class="iconbtn-label">Status</span>
        </a>
        <button type="button" class="iconbtn theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/></svg>
          <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span class="iconbtn-label theme-label">Theme</span>
        </button>
        <form action="/app/logout" method="post" class="logout-form">
          <button type="submit" class="iconbtn" title="Log out" aria-label="Log out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
            <span class="iconbtn-label">Logout</span>
          </button>
        </form>
      </nav>
    </div>
  </header>

  <main>
    <div id="toast"></div>

    <div class="page-head">
      <div>
        <span class="eyebrow"><span class="eyebrow-dot"></span> Ingest a recipe</span>
        <h1>Add</h1>
      </div>
      <div class="head-meta">URL or photo</div>
    </div>

    <div id="add-result"></div>

    <div class="add-grid">
      <form class="add-tile" hx-post="/app/add/url" hx-target="#add-result" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="this">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          URL
        </h2>
        <ul class="add-help">
          <li>Paste a recipe link — parsed into the library.</li>
        </ul>

        <div class="file-row">
          <input type="url" name="url" required placeholder="https://..." autocomplete="off" autofocus>
          <button type="submit" class="primary icon-only" title="Fetch" aria-label="Fetch">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </button>
        </div>

        <div class="add-progress" aria-live="polite">
          <span class="spinning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span>
          <span class="add-progress-text" data-initial="Fetching recipe..." data-llm="Converting the recipe with an LLM...">Fetching recipe...</span>
        </div>
      </form>

      <form class="add-tile" hx-post="/app/add/file" hx-target="#add-result" hx-swap="innerHTML" hx-encoding="multipart/form-data" hx-disabled-elt="find button" hx-indicator="this">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Photo
        </h2>
        <ul class="add-help">
          <li>Snap a recipe (or pick a file) — OCR'd into the library.</li>
        </ul>

        <div class="file-row">
          <label class="file-input" title="Take a photo">
            <input type="file" name="file" accept="image/*" capture="environment" required>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span class="file-input-name">Tap to open camera</span>
          </label>
        </div>

        <div class="add-progress" aria-live="polite">
          <span class="spinning"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span>
          <span>Converting the recipe with an LLM...</span>
        </div>
      </form>
    </div>
  </main>

  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var current = html.dataset.theme ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      var next = current === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      try { localStorage.setItem('epepper-theme', next); } catch (e) {}
    }
  </script>
</body>
</html>
