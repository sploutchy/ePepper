<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>ePepper / sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="centered">
  <main class="login">
    <h1>
      <img src="../logo.svg" alt="" class="pepper">
      ePepper
    </h1>
    <p class="muted">Enter your access code to unlock the recipe library.</p>

    <form action="/app/login" method="post">
      <input type="password" name="api_key" autofocus required placeholder="Access code" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
    <p class="login-hint muted">
      Your access code is the <code>API_KEY</code> set on the server.
      Sessions stay signed in for 30 days.
    </p>
  </main>
</body>
</html>
