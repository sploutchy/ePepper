services:
  epepper:
    build: ./server
    container_name: epepper
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      # Anchors anniversary midnight + saved_at MM-DD comparisons to local time.
      TZ: ${TZ:-Europe/Zurich}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      # Firmware binary + version.txt pushed by CI; served read-only by
      # /firmware/download + /firmware/version for device-side OTA.
      - ./firmware:/app/firmware:ro
