services:
  epepper:
    build: ./server
    container_name: epepper
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      # Anchors anniversary midnight + saved_at MM-DD comparisons to local time.
      TZ: ${TZ:-Europe/Zurich}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      # Firmware binary + version.txt pushed by CI; served read-only by
      # /firmware/download + /firmware/version for device-side OTA.
      - ./firmware:/app/firmware:ro
    # python3 stands in for curl (not installed in the slim image). Marks
    # a hung process unhealthy so `restart: unless-stopped` + autoheal
    # tooling (or a manual `docker ps`) can see it.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
