; ePepper firmware for reTerminal E1001
; ESP32-S3 + 7.5" UC8179 e-paper display

[env:reterminal_e1001]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram = enabled
; Dual 3.3 MB OTA app slots + a 1.5 MB data partition (LittleFS, label
; "spiffs"). The data partition holds the cached recipe pages so page
; turns can be served from flash without Wi-Fi. App slots stay at
; 0x10000 / 0x340000 and otadata at 0xe000 — matching the offsets the
; firmware CI merge_bin step assumes. NOTE: OTA only rewrites the app
; slot, never the partition table, so a device that OTAs onto this build
; keeps whatever table it was last USB-flashed with; LittleFS.begin(true)
; formats-on-fail against the running table's "spiffs" partition either way.
board_build.partitions = default_8MB.csv
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DESP32_S3
    -DBOARD_HAS_PSRAM
    -UARDUINO_USB_CDC_ON_BOOT
    -DARDUINO_USB_CDC_ON_BOOT=0
    -UARDUINO_USB_MODE
    -DARDUINO_USB_MODE=0
    -DBOARD_SCREEN_COMBO=520

lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX.git
    bblanchon/ArduinoJson@^7.0.0
