name: Deploy

# Test, then (on main pushes) SSH to the VPS, pull, rebuild + restart,
# healthcheck. The pytest job gates the deploy — a red test suite never
# reaches the host — and also runs standalone on PRs that touch the
# server, so faulty code is caught before merge.
# Path filter keeps doc-only / firmware-only commits from triggering a rebuild.
# Use the "Run workflow" button in the Actions tab for manual deploys.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Match the python:3.12-slim runtime image.
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements-dev.txt

      - name: Install dependencies
        # requirements-dev.txt chains -r requirements.txt, so this covers
        # both the app and test-only deps (pytest, httpx for TestClient)
        # from one source of truth.
        run: pip install -r requirements-dev.txt

      - name: Run tests
        # tests/conftest.py stubs the required env vars (bot token,
        # API key, temp DATA_DIR) — no secrets needed here.
        run: pytest tests/ -q

  deploy:
    # PRs only run the test job; deploying is a main-push / dispatch thing.
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Never let two deploys overlap on the same host. Job-level (not
    # workflow-level) so PR test runs don't serialize behind a deploy.
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - name: Derive server host
        # SERVER_URL secret holds the full URL (e.g. https://epepper.fyx.ch);
        # appleboy/ssh-action wants just the hostname.
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
        run: |
          host="${SERVER_URL#https://}"
          host="${host#http://}"
          host="${host%%/*}"
          echo "SERVER_HOST=$host" >> "$GITHUB_ENV"

      - name: SSH to VPS and rebuild container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.SERVER_HOST }}
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/debian/epepper
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Pre-deploy smoke: build the new image and exercise its import
            # graph + init_db against a copy of the live DB. Catches the
            # "schema migration crashes on existing DB" / "broken import"
            # class of bugs *before* we swap the running container.
            SMOKE_DB=/tmp/epepper-smoke-db
            SMOKE_TAG=epepper:smoke
            trap 'sudo rm -rf "$SMOKE_DB"; sudo docker rmi -f "$SMOKE_TAG" >/dev/null 2>&1 || true' EXIT

            sudo rm -rf "$SMOKE_DB"
            sudo mkdir -p "$SMOKE_DB"
            sudo cp /home/debian/epepper/data/recipes.db "$SMOKE_DB/recipes.db"

            sudo docker build -q -t "$SMOKE_TAG" ./server >/dev/null
            sudo docker run --rm \
                --env-file /home/debian/epepper/server/.env \
                -e TELEGRAM_BOT_TOKEN=stub-smoke \
                -v "$SMOKE_DB":/app/data \
                "$SMOKE_TAG" \
                python3 -c "import main; import library; library.init_db(); print('smoke ok')"

            # Smoke passed — go live. Trap still cleans up the smoke DB
            # + image after the swap completes (or fails).
            sudo docker compose up -d --build

      - name: Healthcheck
        env:
          SERVER_URL: ${{ secrets.SERVER_URL }}
        run: |
          # / redirects to /app/, which itself redirects unauthenticated
          # requests to /app/login (200) — -fL follows the whole chain and
          # fails only if the final response is an error status. Exercises
          # routing + auth middleware + template rendering, so it's a
          # stronger signal than the old static JSON body ever was.
          for i in $(seq 1 12); do
            if curl -fsSL --max-time 5 -o /dev/null "${SERVER_URL%/}/"; then
              echo "Healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i: not ready, waiting 5s…"
            sleep 5
          done
          echo "Healthcheck failed after 12 attempts (~60s)"
          exit 1
